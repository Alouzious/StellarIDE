version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# StellarIDE — Docker Compose (local development)
#
# Quick start:
#   cp .env.example .env       # Fill in your secrets
#   docker compose up --build
#
# Services:
#   postgres  — PostgreSQL 16 database (port 5432)
#   backend   — Rust + Axum API server  (port 8080)
#   frontend  — React SPA via nginx     (port 3000)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stellaride}
      POSTGRES_USER: ${POSTGRES_USER:-stellaride_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stellaride_user} -d ${POSTGRES_DB:-stellaride}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stellaride_user}:${POSTGRES_PASSWORD:-secure_password}@postgres:5432/${POSTGRES_DB:-stellaride}
      JWT_SECRET: ${JWT_SECRET:-change-me-minimum-32-chars-in-production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      PORT: 8080
      RUST_LOG: ${RUST_LOG:-backend=info,tower_http=info}
      SOROBAN_EXECUTION_MODE: ${SOROBAN_EXECUTION_MODE:-docker}
      SOROBAN_DOCKER_IMAGE: ${SOROBAN_DOCKER_IMAGE:-rust:1.88-bookworm}
      SOROBAN_TIMEOUT_SECONDS: ${SOROBAN_TIMEOUT_SECONDS:-180}
      SOROBAN_SDK_VERSION: ${SOROBAN_SDK_VERSION:-22.0.5}
      SOROBAN_NETWORK: ${SOROBAN_NETWORK:-testnet}
      SOROBAN_RPC_URL: ${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      SOROBAN_CLI_PATH: ${SOROBAN_CLI_PATH:-soroban}
      SOROBAN_DEPLOY_SECRET_KEY: ${SOROBAN_DEPLOY_SECRET_KEY:-}
      SOROBAN_AUDIT_COMMAND: ${SOROBAN_AUDIT_COMMAND:-}
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_APP_NAME: StellarIDE
        VITE_STELLAR_NETWORK: ${VITE_STELLAR_NETWORK:-TESTNET}
        VITE_WALLET_PROVIDER: ${VITE_WALLET_PROVIDER:-freighter}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
    driver: local
